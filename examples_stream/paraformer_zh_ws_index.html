<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>面试系统实时语音识别 (双模式)</title>
  <style>
    :root{
      --bg:#f8fafc;
      --card:#ffffff;
      --muted:#5b6472;
      --text:#0f172a;
      --border:#e5e7eb;
      --ok:#059669;
      --warn:#d97706;
      --danger:#e11d48;
      --primary:#3b82f6;
    }

    html, body { height: 100%; }

    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Noto Sans SC", sans-serif;
      background: var(--bg);
      color:var(--text);
    }

    .wrap{
      height: 100vh;
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px;
      box-sizing: border-box;
      display: flex;
    }

    .card{
      width: 100%;
      height: 100%;
      background: var(--card);
      border:1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      box-sizing: border-box;
      box-shadow: 0 10px 30px rgba(0,0,0,.06);
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
    }

    h1{ font-size: 18px; margin: 0; letter-spacing:.2px; font-weight: 600;}
    h2{ font-size: 14px; margin: 0; color: var(--muted); font-weight: 500;}

    .row{ display:flex; gap:12px; align-items:center; flex-wrap: wrap; }

    button{
      border:1px solid var(--border); border-radius: 12px;
      padding: 10px 16px; cursor:pointer; color:var(--text);
      background: #f8fafc;
      transition: transform .05s ease, background .15s ease, border-color .15s ease;
      font-weight: 600;
      font-size: 14px;
    }
    button:hover{ background: #f1f5f9; border-color:#cbd5e1; }
    button:active{ transform: translateY(1px); }
    button.primary{ border-color: rgba(5,150,105,.35); background: rgba(5,150,105,.10); color: #065f46; }
    button.danger{ border-color: rgba(225,29,72,.35); background: rgba(225,29,72,.10); color: #9f1239; }
    button.session{ border-color: rgba(59,130,246,.35); background: rgba(59,130,246,.10); color: #1d4ed8; }
    button:disabled{ opacity:.5; cursor:not-allowed; }

    .pill{
      font-size: 12px; padding: 6px 10px; border-radius: 999px;
      border:1px solid var(--border); color: var(--muted);
      background: #f8fafc;
      user-select:none;
    }
    .pill.ok{ color: #065f46; border-color: rgba(5,150,105,.35); background: rgba(5,150,105,.10); }
    .pill.warn{ color: #92400e; border-color: rgba(217,119,6,.35); background: rgba(217,119,6,.10); }
    .pill.err{ color: #9f1239; border-color: rgba(225,29,72,.35); background: rgba(225,29,72,.10); }
    .pill.recording{ color: #9f1239; border-color: rgba(225,29,72,.6); background: rgba(225,29,72,.15); animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .panel{
      border:1px solid var(--border);
      border-radius: 12px;
      background: #ffffff;
      padding: 12px;
    }

    .panel.textpanel{
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .panel.configpanel{ background: #f8fafc; }

    .label{ color:var(--muted); font-size: 12px; margin-bottom: 6px; }
    .mono{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New"; }

    input[type="number"]{
      width: 80px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      background: #ffffff;
    }

    input[type="radio"]{ margin-right: 4px; }

    .radio-group{
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .radio-label{
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    #text{
      flex: 1;
      min-height: 0;
      white-space: pre-wrap;
      line-height: 1.6;
      font-size: 15px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #f8fafc;
      overflow: auto;
    }

    #records{
      max-height: 200px;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #f8fafc;
      padding: 12px;
    }

    .record-item{
      padding: 8px 12px;
      margin-bottom: 8px;
      border-radius: 8px;
      background: #ffffff;
      border: 1px solid var(--border);
    }
    .record-item:last-child{ margin-bottom: 0; }

    .record-text{ font-size: 14px; }
    .record-meta{ font-size: 12px; color: var(--muted); margin-top: 4px; }

    .ptt-hint{
      text-align: center;
      padding: 16px;
      border-radius: 12px;
      background: rgba(59,130,246,.05);
      border: 1px solid rgba(59,130,246,.2);
      font-size: 14px;
      color: #1d4ed8;
    }

    .key-hint{
      display: inline-block;
      padding: 4px 12px;
      border-radius: 6px;
      background: #e0e7ff;
      font-weight: 600;
      margin: 0 4px;
    }

    .divider{
      height: 1px;
      background: var(--border);
      margin: 8px 0;
    }

    .info{ font-size: 13px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>面试系统实时语音识别</h1>
      <h2>支持 PTT（按住说话）和 VAD（自动检测）双模式</h2>

      <!-- 面试级别控制 -->
      <div class="panel configpanel">
        <div class="label">面试控制</div>
        <div class="row">
          <button id="btnSessionStart" class="session">面试开始</button>
          <button id="btnSessionEnd" class="danger" disabled>面试结束</button>
          <span id="sessionStatus" class="pill">未开始</span>
        </div>
      </div>

      <!-- 模式选择 -->
      <div class="panel configpanel">
        <div class="label">识别模式</div>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="mode" value="ptt" checked />
            <span>PTT 模式（按住空格说话）</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="mode" value="vad" />
            <span>VAD 模式（自动检测）</span>
          </label>
        </div>
        <div class="divider"></div>
        <div id="vadConfig" class="row" style="display:none;">
          <span class="info">静音超时:</span>
          <input type="number" id="vadTimeout" value="3" min="1" max="10" step="0.5" />
          <span class="info">秒（静音超过此时间自动结束）</span>
        </div>
      </div>

      <!-- PTT 模式提示 -->
      <div id="pttHint" class="ptt-hint">
        按住 <span class="key-hint">空格</span> 开始录音，松开结束录音
      </div>

      <!-- PTT 控制按钮 -->
      <div id="pttControls" class="row">
        <button id="btnRecord" class="primary">手动录音（或按空格）</button>
        <button id="btnStopRecord" class="danger" disabled>停止录音</button>
        <span id="recordStatus" class="pill">待命</span>
      </div>

      <!-- VAD 控制按钮 -->
      <div id="vadControls" class="row" style="display:none;">
        <button id="btnVadStart" class="primary">开始 VAD 监听</button>
        <button id="btnVadEnd" class="danger" disabled>结束 VAD 监听</button>
        <span id="vadStatus" class="pill">待命</span>
      </div>

      <!-- 当前识别文本 -->
      <div class="panel textpanel">
        <div class="label">当前识别文本</div>
        <div id="text"></div>
      </div>

      <!-- 录音记录 -->
      <div class="panel">
        <div class="label">录音记录 <span id="recordCount">(0 条)</span></div>
        <div id="records"></div>
      </div>
    </div>
  </div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);

  // UI 元素
  const btnSessionStart = $("btnSessionStart");
  const btnSessionEnd = $("btnSessionEnd");
  const sessionStatus = $("sessionStatus");

  const modeRadios = document.querySelectorAll('input[name="mode"]');
  const vadConfig = $("vadConfig");
  const vadTimeoutInput = $("vadTimeout");

  const pttHint = $("pttHint");
  const pttControls = $("pttControls");
  const btnRecord = $("btnRecord");
  const btnStopRecord = $("btnStopRecord");
  const recordStatus = $("recordStatus");

  const vadControls = $("vadControls");
  const btnVadStart = $("btnVadStart");
  const btnVadEnd = $("btnVadEnd");
  const vadStatus = $("vadStatus");

  const textEl = $("text");
  const recordsEl = $("records");
  const recordCount = $("recordCount");

  // 音频参数
  const VAD_CHUNK_MS = 200;
  const TARGET_SR = 16000;

  // 状态
  let audioCtx = null;
  let processor = null;
  let source = null;
  let mediaStream = null;

  let ws = null;
  let sessionId = null;
  let sessionActive = false;
  let currentMode = "ptt";
  let isRecording = false;
  let vadActive = false;

  let buf = new Float32Array(0);
  let sending = false;

  // 录音记录
  let records = [];
  let currentRecordText = "";

  // ─── WebSocket 连接 ──────────────────────────────────────────────
  function initWebSocket() {
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const host = window.location.host;
    const wsUrl = `${protocol}//${host}/ws/asr`;

    ws = new WebSocket(wsUrl);
    ws.binaryType = 'arraybuffer';

    ws.onopen = () => {
      console.log("WebSocket connected");
      setStatus(sessionStatus, "已连接", "ok");
    };

    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data);
      console.log("WebSocket message:", msg);

      handleMessage(msg);
    };

    ws.onerror = (error) => {
      console.error("WebSocket error:", error);
      setStatus(sessionStatus, "连接错误", "err");
    };

    ws.onclose = () => {
      console.log("WebSocket closed");
      if (sessionActive) {
        setStatus(sessionStatus, "连接断开", "err");
        stopAudioPipeline();
      }
    };
  }

  function handleMessage(msg) {
    switch (msg.type) {
      case "connected":
        sessionId = msg.session_id;
        console.log("Session ID:", sessionId);
        break;

      case "session_started":
        setStatus(sessionStatus, "面试进行中", "ok");
        break;

      case "session_result":
        // 面试结束，清空当前文本，更新记录列表
        textEl.textContent = "";
        currentRecordText = "";
        updateRecordsDisplay(msg.records);
        setStatus(sessionStatus, "面试结束", "");
        break;

      case "mode_set":
        console.log("Mode set to:", msg.mode);
        break;

      case "record_started":
        setStatus(recordStatus, "录音中...", "recording");
        break;

      case "record_result":
        // PTT 录音结束
        isRecording = false;
        setStatus(recordStatus, "录音完成", "ok");
        addRecord(msg.text, msg.duration);
        currentRecordText = "";
        textEl.textContent = "";
        updateButtons();
        break;

      case "vad_record_started":
        // VAD 检测到开始说话
        currentRecordText = "";
        textEl.textContent = "";
        setStatus(vadStatus, "说话中...", "recording");
        break;

      case "vad_record_result":
        // VAD 检测到结束说话（静音超时）
        setStatus(vadStatus, "监听中...", "ok");
        addRecord(msg.text, msg.duration);
        currentRecordText = "";
        textEl.textContent = "";
        break;

      case "partial":
        // 流式中间结果
        currentRecordText = msg.text;
        textEl.textContent = currentRecordText;
        break;

      case "vad_started":
        vadActive = true;
        setStatus(vadStatus, "监听中...", "ok");
        break;

      case "sentence":
        // VAD 中间断句（不结束本轮）
        currentRecordText += msg.text;
        textEl.textContent = currentRecordText;
        break;
        break;

      case "vad_ended":
        vadActive = false;
        setStatus(vadStatus, "已停止", "");
        break;

      case "error":
        console.error("Error:", msg.message);
        setStatus(sessionStatus, "错误: " + msg.message, "err");
        break;
    }
  }

  function setStatus(el, text, cls) {
    el.textContent = text;
    el.className = "pill " + (cls || "");
  }

  function updateButtons() {
    // Session 按钮
    btnSessionStart.disabled = sessionActive;
    btnSessionEnd.disabled = !sessionActive;

    // PTT 按钮
    btnRecord.disabled = !sessionActive || isRecording;
    btnStopRecord.disabled = !isRecording;

    // VAD 按钮
    btnVadStart.disabled = !sessionActive || vadActive;
    btnVadEnd.disabled = !vadActive;
  }

  // ─── 模式切换 ──────────────────────────────────────────────
  modeRadios.forEach(radio => {
    radio.onchange = () => {
      currentMode = radio.value;
      if (currentMode === "ptt") {
        pttHint.style.display = "block";
        pttControls.style.display = "flex";
        vadConfig.style.display = "none";
        vadControls.style.display = "none";
      } else {
        pttHint.style.display = "none";
        pttControls.style.display = "none";
        vadConfig.style.display = "flex";
        vadControls.style.display = "flex";
      }
    };
  });

  // ─── 面试控制 ──────────────────────────────────────────────
  btnSessionStart.onclick = async () => {
    if (sessionActive) return;

    try {
      setStatus(sessionStatus, "连接中...", "warn");

      // 初始化 WebSocket
      initWebSocket();

      // 等待连接
      await new Promise((resolve, reject) => {
        if (ws.readyState === WebSocket.OPEN) resolve();
        ws.onopen = resolve;
        ws.onerror = reject;
        setTimeout(() => reject(new Error("连接超时")), 5000);
      });

      // 发送面试开始
      ws.send(JSON.stringify({ type: "session_start" }));

      // 设置模式
      ws.send(JSON.stringify({ type: "mode", mode: currentMode }));

      sessionActive = true;
      records = [];
      updateRecordsDisplay([]);
      textEl.textContent = "";

      updateButtons();

    } catch (err) {
      console.error(err);
      setStatus(sessionStatus, "启动失败: " + err.message, "err");
    }
  };

  btnSessionEnd.onclick = async () => {
    if (!sessionActive) return;

    try {
      setStatus(sessionStatus, "结束中...", "warn");

      // 如果正在录音/VAD，先停止
      if (isRecording) {
        ws.send(JSON.stringify({ type: "record_end" }));
      }
      if (vadActive) {
        ws.send(JSON.stringify({ type: "vad_end" }));
      }

      // 停止音频
      await stopAudioPipeline();

      // 发送面试结束
      ws.send(JSON.stringify({ type: "session_end" }));

      // 等待结果
      await new Promise((resolve) => {
        const handler = (event) => {
          const msg = JSON.parse(event.data);
          if (msg.type === "session_result") {
            ws.removeEventListener('message', handler);
            resolve();
          }
        };
        ws.addEventListener('message', handler);
        setTimeout(resolve, 3000);
      });

      sessionActive = false;
      updateButtons();

      if (ws) ws.close();
      ws = null;

    } catch (err) {
      console.error(err);
      setStatus(sessionStatus, "结束失败: " + err.message, "err");
    }
  };

  // ─── PTT 模式 ──────────────────────────────────────────────
  async function startRecording() {
    if (isRecording || !sessionActive) return;

    try {
      setStatus(recordStatus, "准备录音...", "warn");
      isRecording = true;
      updateButtons();

      // 获取麦克风
      await setupAudio();

      // 发送录音开始
      ws.send(JSON.stringify({ type: "record_start" }));

      setStatus(recordStatus, "录音中...", "recording");

    } catch (err) {
      console.error(err);
      setStatus(recordStatus, "录音失败: " + err.message, "err");
      isRecording = false;
      updateButtons();
    }
  }

  async function stopRecording() {
    if (!isRecording) return;

    try {
      setStatus(recordStatus, "处理中...", "warn");

      // 停止音频
      await stopAudioPipeline();

      // 发送录音结束
      ws.send(JSON.stringify({ type: "record_end" }));

      isRecording = false;

    } catch (err) {
      console.error(err);
      setStatus(recordStatus, "停止失败: " + err.message, "err");
      isRecording = false;
      updateButtons();
    }
  }

  btnRecord.onclick = startRecording;
  btnStopRecord.onclick = stopRecording;

  // 空格键监听（PTT）
  document.onkeydown = (e) => {
    if (e.code === 'Space' && currentMode === 'ptt' && sessionActive && !isRecording) {
      e.preventDefault();
      startRecording();
    }
  };

  document.onkeyup = (e) => {
    if (e.code === 'Space' && currentMode === 'ptt' && isRecording) {
      e.preventDefault();
      stopRecording();
    }
  };

  // ─── VAD 模式 ──────────────────────────────────────────────
  btnVadStart.onclick = async () => {
    if (vadActive || !sessionActive) return;

    try {
      setStatus(vadStatus, "准备监听...", "warn");
      vadActive = true;
      updateButtons();

      // 获取麦克风
      await setupAudio();

      // 发送 VAD 开始
      const timeout = parseFloat(vadTimeoutInput.value) || 3;
      ws.send(JSON.stringify({ type: "vad_start", timeout }));

      setStatus(vadStatus, "监听中...", "ok");

    } catch (err) {
      console.error(err);
      setStatus(vadStatus, "启动失败: " + err.message, "err");
      vadActive = false;
      updateButtons();
    }
  };

  btnVadEnd.onclick = async () => {
    if (!vadActive) return;

    try {
      setStatus(vadStatus, "停止中...", "warn");

      // 停止音频
      await stopAudioPipeline();

      // 发送 VAD 结束
      ws.send(JSON.stringify({ type: "vad_end" }));

    } catch (err) {
      console.error(err);
      setStatus(vadStatus, "停止失败: " + err.message, "err");
    }
  };

  // ─── 音频处理 ──────────────────────────────────────────────
  async function setupAudio() {
    if (mediaStream) return; // 已有音频流

    mediaStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        channelCount: 1,
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true
      },
      video: false
    });

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    source = audioCtx.createMediaStreamSource(mediaStream);

    processor = audioCtx.createScriptProcessor(4096, 1, 1);
    const chunkSamples = Math.round(TARGET_SR * (VAD_CHUNK_MS / 1000));

    processor.onaudioprocess = (e) => {
      if (!sessionActive) return;
      if (currentMode === 'ptt' && !isRecording) return;
      if (currentMode === 'vad' && !vadActive) return;

      const input = e.inputBuffer.getChannelData(0);
      const resampled = resampleLinear(input, audioCtx.sampleRate, TARGET_SR);
      buf = concatFloat32(buf, resampled);
      if (!sending) pump();
    };

    source.connect(processor);
    processor.connect(audioCtx.destination);
  }

  async function stopAudioPipeline() {
    try {
      if (processor) { processor.disconnect(); processor.onaudioprocess = null; }
      if (source) source.disconnect();
      if (audioCtx) await audioCtx.close();
      if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
    } catch (e) {}
    processor = null;
    source = null;
    audioCtx = null;
    mediaStream = null;
    buf = new Float32Array(0);
    sending = false;
  }

  function concatFloat32(a, b) {
    const out = new Float32Array(a.length + b.length);
    out.set(a, 0);
    out.set(b, a.length);
    return out;
  }

  function resampleLinear(input, srcSr, dstSr) {
    if (srcSr === dstSr) return input;
    const ratio = dstSr / srcSr;
    const outLen = Math.max(0, Math.round(input.length * ratio));
    const out = new Float32Array(outLen);
    for (let i = 0; i < outLen; i++) {
      const x = i / ratio;
      const x0 = Math.floor(x);
      const x1 = Math.min(x0 + 1, input.length - 1);
      const t = x - x0;
      out[i] = input[x0] * (1 - t) + input[x1] * t;
    }
    return out;
  }

  async function pump() {
    if (sending) return;
    sending = true;

    const chunkSamples = Math.round(TARGET_SR * (VAD_CHUNK_MS / 1000));

    try {
      while (buf.length >= chunkSamples && ws && ws.readyState === WebSocket.OPEN) {
        const canSend = (currentMode === 'ptt' && isRecording) ||
                        (currentMode === 'vad' && vadActive);
        if (!canSend) break;

        const chunk = buf.slice(0, chunkSamples);
        buf = buf.slice(chunkSamples);
        ws.send(chunk.buffer);
      }
    } catch (err) {
      console.error(err);
    } finally {
      sending = false;
    }
  }

  // ─── 录音记录显示 ──────────────────────────────────────────────
  function addRecord(text, duration) {
    records.push({ text, duration });
    updateRecordsDisplay(records);
  }

  function updateRecordsDisplay(recordList) {
    recordCount.textContent = `(${recordList.length} 条)`;
    recordsEl.innerHTML = recordList.map((r, i) => `
      <div class="record-item">
        <div class="record-text">${r.text || '(空)'}</div>
        <div class="record-meta">第 ${i + 1} 条 | 时长: ${r.duration.toFixed(2)}秒</div>
      </div>
    `).join('');
  }

})();
</script>
</body>
</html>
